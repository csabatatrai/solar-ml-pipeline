name: solar_env
channels:
  - conda-forge
dependencies:
  # Python alapverzió
  - python=3.10.20

  # Adatkinyerés (API hívások)
  - requests=2.33.1

  # Adatfeldolgozás és Betöltés (ETL)
  - pandas=2.3.3

  # pip-ből: PyPI-ről telepítve (conda-forge build helyett konzisztencia miatt)
  - pip:
    - duckdb==1.5.2

  # Szimuláció és Modellezés
  - pvlib=0.15.1
  - numpy=2.2.6

  # Vizualizáció
  - matplotlib=3.10.9
  - seaborn=0.13.2

  # Fejlesztői környezet (Jupyter)
  - jupyter=1.1.1
  - notebook=7.5.5
  - ipykernel=7.2.0
